done_statuses = ["Done"]
active_statuses = ["Ready", "Doing"]
leaf_filter = "isIndex == false"
outcome_close_verify = []
pr_merge_strategy = "squash"
commit_style = "conventional"
auto_push = true
required_code_coverage = 85.0

[status_values]
pending = "Ready"
specified = "Ready"
in_progress = "Doing"
completed = "Done"
blocked = "Blocked"
obsolete = "Obsolete"
