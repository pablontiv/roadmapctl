name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: pablontiv/crossbeam/.github/workflows/go-ci.yml@v1
    with:
      go-version-file: go.mod
      coverage-threshold: 0 # cobertura validada por smoke job en 3 plataformas

  gitleaks:
    uses: pablontiv/crossbeam/.github/workflows/gitleaks.yml@v1

  smoke:
    name: Smoke tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Rootline
        shell: bash
        run: |
          go install github.com/pablontiv/rootline/cmd/rootline@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify Rootline
        shell: bash
        run: rootline --version

      - name: Coverage gate
        shell: bash
        run: ./scripts/check-coverage.sh

      - name: Roadmapctl smoke
        shell: bash
        run: |
          go run ./cmd/roadmapctl check --repo testdata/fixtures/valid-outcome-with-tasks --output json --strict
          go run ./cmd/roadmapctl lint --repo testdata/fixtures/lint-valid --output json --strict

  release:
    uses: pablontiv/crossbeam/.github/workflows/go-release.yml@v1
    needs: [ci, gitleaks, smoke]
    if: github.event_name == 'push'
    with:
      quality-gate-jobs: '["ci","gitleaks","smoke"]'
      binary-name: roadmapctl
    permissions:
      contents: write
      id-token: write
      attestations: write
