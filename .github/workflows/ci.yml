name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Go ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Rootline
        shell: bash
        run: |
          go install github.com/pablontiv/rootline/cmd/rootline@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify Rootline
        shell: bash
        run: rootline --version

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/roadmapctl
