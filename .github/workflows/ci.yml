name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Go ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Rootline
        shell: bash
        run: |
          go install github.com/pablontiv/rootline/cmd/rootline@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify Rootline
        shell: bash
        run: rootline --version

      - name: Test and coverage
        shell: bash
        run: ./scripts/check-coverage.sh

      - name: Build
        run: go build ./cmd/roadmapctl

      - name: Roadmapctl CI smoke
        shell: bash
        run: |
          go run ./cmd/roadmapctl check --repo testdata/fixtures/valid-outcome-with-tasks --output json --strict > roadmapctl-check.json
          go run ./cmd/roadmapctl lint --repo testdata/fixtures/lint-valid --output json --strict > roadmapctl-lint.json
